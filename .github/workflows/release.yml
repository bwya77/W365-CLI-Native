name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      HAS_SIGNING: ${{ secrets.AZURE_CLIENT_ID != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Set version
        id: version
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF_TYPE -eq 'tag') { $env:GITHUB_REF_NAME.TrimStart('v') } else { '0.0.0-dev' }
          $assemblyVersion = ($version -split '-')[0]
          "version=$version" >> $env:GITHUB_OUTPUT
          "assemblyVersion=$assemblyVersion" >> $env:GITHUB_OUTPUT

      - name: Publish win-x64
        shell: pwsh
        run: |
          dotnet publish .\src\W365Cli\W365Cli.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:PublishTrimmed=false `
            -p:Version=${{ steps.version.outputs.version }} `
            -p:AssemblyVersion=${{ steps.version.outputs.assemblyVersion }} `
            -p:FileVersion=${{ steps.version.outputs.assemblyVersion }} `
            --output .\artifacts\w365-win-x64

      - name: Sign executable
        if: env.HAS_SIGNING == 'true'
        uses: azure/artifact-signing-action@v2
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ vars.TRUSTED_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.TRUSTED_SIGNING_PROFILE }}
          files-folder: ${{ github.workspace }}\artifacts\w365-win-x64
          files-folder-filter: exe
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify signature
        if: env.HAS_SIGNING == 'true'
        shell: pwsh
        run: |
          $signature = Get-AuthenticodeSignature .\artifacts\w365-win-x64\W365Cli.exe
          $signature | Format-List
          if ($signature.Status -ne 'Valid') {
            throw "W365Cli.exe signature status was $($signature.Status)"
          }

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\artifacts\release | Out-Null
          Compress-Archive -Path .\artifacts\w365-win-x64\* -DestinationPath .\artifacts\release\w365-win-x64.zip -Force
          Get-FileHash .\artifacts\release\w365-win-x64.zip -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash)  w365-win-x64.zip" } |
            Set-Content .\artifacts\release\w365-win-x64.zip.sha256

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/release/w365-win-x64.zip
            artifacts/release/w365-win-x64.zip.sha256
          generate_release_notes: true
